<!DOCTYPE html>
<html>
<head>
  <title>Happy Birthday เด็กดื้อ ❤️</title>
  <meta name="viewport" content="width=device-width, initial-scale=1.0">

  <style>
    body {
      margin: 0;
      text-align: center;
      font-family: sans-serif;
      background: linear-gradient(to right, #ff758c, #ff7eb3);
      color: white;
      overflow-x: hidden;
    }

    h1 { margin-top: 30px; }

    #text {
      font-size: 18px;
      padding: 0 20px;
      min-height: 60px;
    }

    img {
      width: 80%;
      max-width: 300px;
      border-radius: 20px;
      margin-top: 20px;
    }

    /* 🎈 ลูกโป่ง */
    .balloon {
      position: fixed;
      bottom: -100px;
      width: 40px;
      height: 50px;
      border-radius: 50%;
      animation: float 6s infinite;
    }

    @keyframes float {
      0% { transform: translateY(0); }
      100% { transform: translateY(-110vh); }
    }

    /* 👇 หน้าจอเริ่ม */
    #startScreen {
      position: fixed;
      top:0; left:0;
      width:100%; height:100%;
      background: rgba(0,0,0,0.7);
      display:flex;
      align-items:center;
      justify-content:center;
      flex-direction:column;
      font-size:22px;
      z-index:999;
      text-align:center;
    }
  </style>
</head>

<body>

  <!-- 👇 หน้าแตะเพื่อเริ่ม -->
  <div id="startScreen">
    <div>🎁 มีอะไรจะให้...</div>
    <div style="margin-top:10px;">👆 แตะหน้าจอเพื่อเปิด ❤️</div>
  </div>

  <h1>🎂 Happy Birthday เด็กดื้อ ❤️</h1>

  <p id="text"></p>

  <!-- 📸 รูป -->
  <img src="https://lh3.googleusercontent.com/d/1dFSn7LB34lqxgvJ_aOqlx63cHnQOQxC5">

  <!-- 🎵 เพลง -->
  <audio id="bgm" loop>
    <source src="music.mp3" type="audio/mpeg">
  </audio>

  <!-- 🎈 ลูกโป่ง -->
  <div class="balloon" style="left:10%; background:#ff4d6d;"></div>
  <div class="balloon" style="left:30%; background:#ffd166; animation-delay:2s;"></div>
  <div class="balloon" style="left:50%; background:#06d6a0; animation-delay:4s;"></div>
  <div class="balloon" style="left:70%; background:#118ab2; animation-delay:1s;"></div>
  <div class="balloon" style="left:90%; background:#ef476f; animation-delay:3s;"></div>

  <script>
    // 🎵 เล่นเพลงเมื่อแตะ
    document.getElementById("startScreen").addEventListener("click", function() {
      document.getElementById("bgm").play();
      this.style.display = "none";
    });

    // ✨ พิมพ์ข้อความ
    const message = "ขอให้เด็กดื้อมีความสุขมากๆนะ ❤️ อยู่ด้วยกันไปนานๆเลยนะ 💖";
    let i = 0;

    function typing() {
      if (i < message.length) {
        document.getElementById("text").innerHTML += message.charAt(i);
        i++;
        setTimeout(typing, 60);
      }
    }

    typing();
  </script>

</body>
</html>
