<!DOCTYPE html>
<html>
<head>
  <title>Happy Birthday เด็กดื้อ ❤️</title>
  <meta name="viewport" content="width=device-width, initial-scale=1.0">

  <style>
    body {
      margin: 0;
      text-align: center;
      font-family: sans-serif;
      background: linear-gradient(to right, #ff758c, #ff7eb3);
      color: white;
      overflow-x: hidden;
    }

    h1 { margin-top: 30px; }

    #text {
      font-size: 18px;
      padding: 0 20px;
      min-height: 60px;
      white-space: pre-wrap;
    }

    img {
      width: 80%;
      max-width: 300px;
      border-radius: 20px;
      margin-top: 20px;
    }

    .balloon {
      position: fixed;
      bottom: -100px;
      width: 40px;
      height: 50px;
      border-radius: 50%;
      animation: float 6s infinite;
    }

    @keyframes float {
      0% { transform: translateY(0); }
      100% { transform: translateY(-110vh); }
    }

    #startScreen {
      position: fixed;
      top:0; left:0;
      width:100%; height:100%;
      background: rgba(0,0,0,0.7);
      display:flex;
      align-items:center;
      justify-content:center;
      flex-direction:column;
      font-size:22px;
      z-index:999;
    }
  </style>
</head>

<body>

  <div id="startScreen">
    🎁 แตะหน้าจอเพื่อเริ่ม ❤️
  </div>

  <h1>🎂 Happy Birthday เด็กดื้อ ❤️</h1>

  <p id="text"></p>

  <img src="https://lh3.googleusercontent.com/d/1dFSn7LB34lqxgvJ_aOqlx63cHnQOQxC5">

  <audio id="bgm" loop>
    <source src="music.mp3" type="audio/mpeg">
  </audio>

  <div class="balloon" style="left:10%; background:#ff4d6d;"></div>
  <div class="balloon" style="left:50%; background:#ffd166;"></div>
  <div class="balloon" style="left:80%; background:#06d6a0;"></div>

  <script>
    // 🎵 เริ่มเพลง + เริ่มข้อความ
    document.getElementById("startScreen").addEventListener("click", function() {
      document.getElementById("bgm").play();
      this.style.display = "none";
      typing(); // เริ่มพิมพ์หลังจากกด
    });

    // 💌 ข้อความ
    const message = "ขอให้เด็กดื้อมีความสุขมากๆนะ ❤️ อยู่ด้วยกันไปนานๆเลยนะ 👫 ไอ้แก่คนนี้รักเด็กดื้อคนนี้ที่สุดเลยย 💖";

    let i = 0;
    let timer;

    function typing() {
      const el = document.getElementById("text");

      if (i < message.length) {
        el.textContent = message.substring(0, i + 1);
        i++;
        timer = setTimeout(typing, 40);
      } else {
        clearTimeout(timer);
      }
    }
  </script>

</body>
</html>
