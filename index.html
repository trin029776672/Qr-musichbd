<!DOCTYPE html>
<html>
<head>
  <title>Happy Birthday เด็กดื้อ ❤️</title>
  <meta name="viewport" content="width=device-width, initial-scale=1.0">

  <style>
    body {
      margin: 0;
      text-align: center;
      font-family: sans-serif;
      background: linear-gradient(to right, #ff758c, #ff7eb3);
      color: white;
      overflow-x: hidden;
    }

    h1 {
      margin-top: 30px;
    }

    #text {
      font-size: 18px;
      padding: 0 20px;
      min-height: 60px;
    }

    img {
      width: 80%;
      max-width: 300px;
      border-radius: 20px;
      margin-top: 20px;
    }

    .balloon {
      position: fixed;
      bottom: -100px;
      width: 40px;
      height: 50px;
      border-radius: 50%;
      animation: float 6s infinite;
    }

    @keyframes float {
      0% { transform: translateY(0); }
      100% { transform: translateY(-110vh); }
    }
  </style>
</head>

<body>

  <h1>🎂 Happy Birthday เด็กดื้อ ❤️</h1>

  <p id="text"></p>

  <!-- 📸 รูป -->
  <img src="https://lh3.googleusercontent.com/d/1dFSn7LB34lqxgvJ_aOqlx63cHnQOQxC5">

  <!-- 🎵 เพลง -->
  <audio autoplay loop>
    <source src="music.mp3" type="audio/mpeg">
  </audio>

  <!-- 🎈 ลูกโป่ง -->
  <div class="balloon" style="left:10%; background:#ff4d6d;"></div>
  <div class="balloon" style="left:50%; background:#ffd166;"></div>
  <div class="balloon" style="left:80%; background:#06d6a0;"></div>

  <script>
    const message = "ขอให้เด็กดื้อมีความสุขมากๆนะ ❤️ อยู่ด้วยกันไปนานๆเลยนะ 💖";
    let i = 0;

    function typing() {
      if (i < message.length) {
        document.getElementById("text").innerHTML += message.charAt(i);
        i++;
        setTimeout(typing, 60);
      }
    }

    typing();
  </script>

</body>
</html>
